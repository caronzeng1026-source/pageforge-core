<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageForge 编辑面板</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
  <div class="panel">
    <!-- 顶部标题栏 -->
    <header class="panel-header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        <span>PageForge</span>
      </div>
      <div class="header-actions">
        <!-- 视口切换 -->
        <div class="viewport-toggles btn-group" style="margin-right: 4px;">
          <button id="btn-vp-desktop" class="style-btn active" title="桌面视口 (默认)" data-width="default">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
          </button>
          <button id="btn-vp-tablet" class="style-btn" title="平板视口 (768px)" data-width="768">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="2" width="16" height="20" rx="2" ry="2" />
              <line x1="12" y1="18" x2="12.01" y2="18" />
            </svg>
          </button>
          <button id="btn-vp-mobile" class="style-btn" title="移动视口 (390px)" data-width="390">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
              <line x1="12" y1="18" x2="12.01" y2="18" />
            </svg>
          </button>
        </div>

        <!-- 主题切换 -->
        <select id="theme-selector" class="theme-select" title="选择主题">
          <option value="theme-dark">Dark</option>
          <option value="theme-light">Light</option>
          <option value="theme-glass">Glass</option>
          <option value="theme-cyber">Cyber</option>
          <option value="theme-nature">Nature</option>
        </select>

        <button id="btn-preview" class="icon-btn" title="对比原文档（预览下无法编辑）" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="icon-eye">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="icon-eye-off" style="display: none;">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
            </path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        </button>

        <button id="btn-undo" class="icon-btn" title="撤销 (Ctrl+Z)" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10" />
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
          </svg>
        </button>
        <button id="btn-redo" class="icon-btn" title="重做 (Ctrl+Y)" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
        </button>
      </div>
    </header>

    <!-- 编辑模式开关 -->
    <div class="edit-toggle-section">
      <button id="btn-toggle-edit" class="edit-toggle-btn" title="开启或关闭页面可视化编辑功能">
        <span class="toggle-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
        </span>
        <span class="toggle-text">开启编辑模式</span>
      </button>
    </div>

    <!-- Tab 栏（编辑模式下显示） -->
    <div id="tab-bar" class="tab-bar" style="display: none;">
      <button class="tab-btn active" data-tab="edit" title="编辑选中的元素属性">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        <span>编辑</span>
      </button>
      <button class="tab-btn" data-tab="insert" title="向页面插入新的界面元素">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        <span>插入</span>
      </button>
    </div>

    <!-- ===== 编辑 Tab 内容 ===== -->
    <div id="tab-edit" class="tab-content active">

      <!-- 未选中元素时的提示 -->
      <div id="no-selection" class="placeholder-message">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
          <circle cx="12" cy="12" r="10" />
          <path d="M8 15h8" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
        </svg>
        <p>开启编辑模式后<br>点击页面元素开始编辑</p>
      </div>

      <!-- 编辑面板（选中元素后显示） -->
      <div id="edit-panels" class="edit-panels" style="display: none;">
        <!-- 元素信息 -->
        <div class="panel-section element-info">
          <div class="element-info-single" id="element-info-single">
            <div class="element-tag" id="element-tag">div</div>
            <div class="element-path" id="element-path" title="">body > div</div>
          </div>
          <div class="element-info-multi" id="element-info-multi" style="display: none;">
            <div class="multi-select-count">已选中 <span id="multi-select-number">2</span> 个元素</div>
            <div class="multi-select-hint">您可以批量修改它们的样式</div>
          </div>
        </div>

        <!-- 文本编辑区 -->
        <div class="panel-section">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7V4h16v3" />
              <path d="M9 20h6" />
              <path d="M12 4v16" />
            </svg>
            <span>文本</span>
          </div>
          <div class="section-body">
            <!-- 字体选择 -->
            <div class="control-row">
              <label>字体</label>
              <select id="font-family" class="select-input">
                <option value="">默认</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Helvetica Neue', Helvetica, sans-serif">Helvetica</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Courier New', monospace">Courier New</option>
                <option value="Verdana, sans-serif">Verdana</option>
                <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                <option value="'PingFang SC', sans-serif">苹方</option>
                <option value="'Source Han Sans', sans-serif">思源黑体</option>
                <option value="'Noto Sans SC', sans-serif">Noto Sans</option>
              </select>
            </div>

            <!-- 字号 -->
            <div class="control-row">
              <label>字号</label>
              <div class="input-with-unit">
                <input type="number" id="font-size" class="number-input" min="8" max="200" step="1">
                <span class="unit">px</span>
              </div>
            </div>

            <!-- 文字颜色 -->
            <div class="control-row">
              <label>颜色</label>
              <div class="color-input-wrapper">
                <input type="color" id="text-color" class="color-input">
                <input type="text" id="text-color-hex" class="hex-input" placeholder="#000000">
              </div>
            </div>

            <!-- 文字样式按钮组 -->
            <div class="control-row">
              <label>样式</label>
              <div class="btn-group">
                <button class="style-btn" id="btn-bold" title="加粗">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                    <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" />
                  </svg>
                </button>
                <button class="style-btn" id="btn-italic" title="斜体">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="4" x2="10" y2="4" />
                    <line x1="14" y1="20" x2="5" y2="20" />
                    <line x1="15" y1="4" x2="9" y2="20" />
                  </svg>
                </button>
                <button class="style-btn" id="btn-underline" title="下划线">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3" />
                    <line x1="4" y1="21" x2="20" y2="21" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- 文本对齐 -->
            <div class="control-row">
              <label>对齐</label>
              <div class="btn-group">
                <button class="style-btn" id="btn-align-left" title="左对齐" data-align="left">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="17" y1="10" x2="3" y2="10" />
                    <line x1="21" y1="6" x2="3" y2="6" />
                    <line x1="17" y1="14" x2="3" y2="14" />
                    <line x1="21" y1="18" x2="3" y2="18" />
                  </svg>
                </button>
                <button class="style-btn" id="btn-align-center" title="居中" data-align="center">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="10" x2="6" y2="10" />
                    <line x1="21" y1="6" x2="3" y2="6" />
                    <line x1="18" y1="14" x2="6" y2="14" />
                    <line x1="21" y1="18" x2="3" y2="18" />
                  </svg>
                </button>
                <button class="style-btn" id="btn-align-right" title="右对齐" data-align="right">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="21" y1="10" x2="7" y2="10" />
                    <line x1="21" y1="6" x2="3" y2="6" />
                    <line x1="21" y1="14" x2="7" y2="14" />
                    <line x1="21" y1="18" x2="3" y2="18" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 外观编辑区 -->
        <div class="panel-section">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            </svg>
            <span>外观</span>
          </div>
          <div class="section-body">
            <!-- 背景颜色 -->
            <div class="control-row">
              <label>背景</label>
              <div class="color-input-wrapper">
                <input type="color" id="bg-color" class="color-input">
                <input type="text" id="bg-color-hex" class="hex-input" placeholder="transparent">
              </div>
            </div>

            <!-- 透明度 -->
            <div class="control-row">
              <label>透明度</label>
              <div class="slider-wrapper">
                <input type="range" id="opacity" class="slider" min="0" max="1" step="0.05" value="1">
                <span id="opacity-value" class="slider-value">1</span>
              </div>
            </div>

            <!-- 圆角 -->
            <div class="control-row">
              <label>圆角</label>
              <div class="input-with-unit">
                <input type="number" id="border-radius" class="number-input" min="0" max="999" step="1">
                <span class="unit">px</span>
              </div>
            </div>

            <!-- 边框 -->
            <div class="control-row">
              <label>边框</label>
              <div class="border-controls">
                <input type="number" id="border-width" class="number-input small" min="0" max="20" step="1"
                  placeholder="0">
                <select id="border-style" class="select-input small">
                  <option value="none">无</option>
                  <option value="solid">实线</option>
                  <option value="dashed">虚线</option>
                  <option value="dotted">点线</option>
                </select>
                <input type="color" id="border-color" class="color-input small">
              </div>
            </div>
          </div>
        </div>

        <!-- 间距编辑区 -->
        <div class="panel-section">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 3 21 3 21 9" />
              <polyline points="9 21 3 21 3 15" />
              <line x1="21" y1="3" x2="14" y2="10" />
              <line x1="3" y1="21" x2="10" y2="14" />
            </svg>
            <span>间距</span>
          </div>
          <div class="section-body">
            <!-- 内边距 -->
            <div class="spacing-group">
              <label class="spacing-label">内边距</label>
              <div class="spacing-inputs">
                <div class="spacing-input-item">
                  <input type="number" id="padding-top" class="number-input tiny" min="0" step="1" placeholder="0">
                  <span class="spacing-dir">上</span>
                </div>
                <div class="spacing-input-item">
                  <input type="number" id="padding-right" class="number-input tiny" min="0" step="1" placeholder="0">
                  <span class="spacing-dir">右</span>
                </div>
                <div class="spacing-input-item">
                  <input type="number" id="padding-bottom" class="number-input tiny" min="0" step="1" placeholder="0">
                  <span class="spacing-dir">下</span>
                </div>
                <div class="spacing-input-item">
                  <input type="number" id="padding-left" class="number-input tiny" min="0" step="1" placeholder="0">
                  <span class="spacing-dir">左</span>
                </div>
              </div>
            </div>

            <!-- 外边距 -->
            <div class="spacing-group">
              <label class="spacing-label">外边距</label>
              <div class="spacing-inputs">
                <div class="spacing-input-item">
                  <input type="number" id="margin-top" class="number-input tiny" min="-999" step="1" placeholder="0">
                  <span class="spacing-dir">上</span>
                </div>
                <div class="spacing-input-item">
                  <input type="number" id="margin-right" class="number-input tiny" min="-999" step="1" placeholder="0">
                  <span class="spacing-dir">右</span>
                </div>
                <div class="spacing-input-item">
                  <input type="number" id="margin-bottom" class="number-input tiny" min="-999" step="1" placeholder="0">
                  <span class="spacing-dir">下</span>
                </div>
                <div class="spacing-input-item">
                  <input type="number" id="margin-left" class="number-input tiny" min="-999" step="1" placeholder="0">
                  <span class="spacing-dir">左</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 布局属性区（容器元素显示） -->
        <div class="panel-section" id="layout-section" style="display: none;">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
            <span>布局</span>
          </div>
          <div class="section-body">
            <!-- Display 模式切换 -->
            <div class="control-row">
              <label>模式</label>
              <div class="btn-group">
                <button class="style-btn display-mode-btn" id="btn-display-block" title="常规布局" data-display="block">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                  </svg>
                </button>
                <button class="style-btn display-mode-btn" id="btn-display-flex" title="弹性布局" data-display="flex">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="5" width="7" height="14" rx="1" />
                    <rect x="14" y="5" width="7" height="14" rx="1" />
                  </svg>
                </button>
                <button class="style-btn display-mode-btn" id="btn-display-grid" title="网格布局" data-display="grid">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                  </svg>
                </button>
              </div>
            </div>

            <!-- ===== 多选编组选项 ===== -->
            <div id="multi-select-group-options"
              style="display: none; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);">
              <div class="control-row" style="margin-bottom: 8px;">
                <label style="width: auto; margin-right: 8px;">组合布局</label>
                <span style="font-size: 11px; color: var(--text-secondary); flex: 1;">将选中的分散元素打包到一个容器中</span>
              </div>
              <div class="btn-group" style="display: flex; gap: 8px;">
                <button class="action-btn" id="btn-group-row" style="flex: 1; padding: 6px;" title="将高亮的元素横向打包到一个容器组中">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="margin-right: 4px;">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="12" y1="3" x2="12" y2="21" />
                  </svg>
                  横向成组
                </button>
                <button class="action-btn" id="btn-group-col" style="flex: 1; padding: 6px;" title="将高亮的元素纵向打包到一个容器组中">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="margin-right: 4px;">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                  </svg>
                  纵向成组
                </button>
              </div>
            </div>

            <!-- ===== Flex 选项 ===== -->
            <div id="flex-options" style="display: none;">
              <!-- 方向 -->
              <div class="control-row">
                <label>方向</label>
                <div class="btn-group">
                  <button class="style-btn" id="btn-flex-row" title="横向排列" data-direction="row">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="3" y="5" width="7" height="14" rx="1" />
                      <rect x="14" y="5" width="7" height="14" rx="1" />
                    </svg>
                  </button>
                  <button class="style-btn" id="btn-flex-col" title="纵向排列" data-direction="column">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <rect x="5" y="3" width="14" height="7" rx="1" />
                      <rect x="5" y="14" width="14" height="7" rx="1" />
                    </svg>
                  </button>
                </div>
              </div>
              <!-- 间距 -->
              <div class="control-row">
                <label>间距</label>
                <div class="input-with-unit">
                  <input type="number" id="flex-gap" class="number-input" min="0" max="200" step="1" placeholder="16">
                  <span class="unit">px</span>
                </div>
              </div>
              <!-- 主轴对齐 -->
              <div class="control-row">
                <label>主轴</label>
                <select id="justify-content" class="select-input">
                  <option value="flex-start">起始</option>
                  <option value="center">居中</option>
                  <option value="flex-end">末尾</option>
                  <option value="space-between">两端</option>
                  <option value="space-around">环绕</option>
                  <option value="space-evenly">均匀</option>
                </select>
              </div>
              <!-- 交叉轴对齐 -->
              <div class="control-row">
                <label>交叉轴</label>
                <select id="align-items" class="select-input">
                  <option value="stretch">拉伸</option>
                  <option value="flex-start">起始</option>
                  <option value="center">居中</option>
                  <option value="flex-end">末尾</option>
                  <option value="baseline">基线</option>
                </select>
              </div>
              <!-- 换行 -->
              <div class="control-row">
                <label>换行</label>
                <select id="flex-wrap" class="select-input">
                  <option value="nowrap">不换行</option>
                  <option value="wrap">换行</option>
                </select>
              </div>
            </div>

            <!-- ===== Grid 选项 ===== -->
            <div id="grid-options" style="display: none;">
              <!-- 列数 -->
              <div class="control-row">
                <label>列数</label>
                <div class="btn-group">
                  <button class="style-btn grid-col-btn" data-cols="1" title="1列">1</button>
                  <button class="style-btn grid-col-btn" data-cols="2" title="2列">2</button>
                  <button class="style-btn grid-col-btn" data-cols="3" title="3列">3</button>
                  <button class="style-btn grid-col-btn" data-cols="4" title="4列">4</button>
                </div>
              </div>
              <!-- 间距 -->
              <div class="control-row">
                <label>间距</label>
                <div class="input-with-unit">
                  <input type="number" id="grid-gap" class="number-input" min="0" max="200" step="1" placeholder="16">
                  <span class="unit">px</span>
                </div>
              </div>
              <!-- 对齐 -->
              <div class="control-row">
                <label>对齐</label>
                <select id="grid-align-items" class="select-input">
                  <option value="stretch">拉伸</option>
                  <option value="start">起始</option>
                  <option value="center">居中</option>
                  <option value="end">末尾</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- 元素操作区 -->
        <div class="panel-section">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="1" />
              <circle cx="19" cy="12" r="1" />
              <circle cx="5" cy="12" r="1" />
            </svg>
            <span>元素操作</span>
          </div>
          <div class="section-body">
            <div class="action-buttons">
              <button id="btn-hide" class="action-btn action-hide" title="隐藏元素（可撤销）">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
                <span>隐藏</span>
              </button>
              <button id="btn-delete" class="action-btn action-delete" title="删除元素（可撤销）">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6" />
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
                <span>删除</span>
              </button>
            </div>
          </div>
        </div>

        <!-- 导出与保存按钮区 -->
        <div class="panel-section" id="save-section">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>导出并保存</span>
          </div>
          <div class="section-body">
            <div class="export-actions" style="display: flex; flex-direction: column; gap: 8px;">
              <button id="btn-save-html" class="save-btn" title="将当前编辑状态保存为完整的 HTML 文件">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="16" y1="13" x2="8" y2="13" />
                  <line x1="16" y1="17" x2="8" y2="17" />
                  <polyline points="10 9 9 9 8 9" />
                </svg>
                <span>导出完整 HTML</span>
              </button>

              <div style="display: flex; gap: 8px;">
                <button id="btn-save-css" class="action-btn" style="flex: 1;" title="仅导出您修改过的样式，生成 CSS Patch 文件">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="margin-right: 4px;">
                    <path d="M12 2l3 6 6 1-4.5 4.5L18 20l-6-3.5L6 20l1.5-6.5L3 9l6-1z" />
                  </svg>
                  CSS Patch
                </button>
                <button id="btn-save-json" class="action-btn" style="flex: 1;" title="导出包含所有编辑步骤的 JSON 操作日志">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="margin-right: 4px;">
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                  </svg>
                  Action Log
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 插入 Tab 内容 ===== -->
    <div id="tab-insert" class="tab-content" style="display: none;">
      <div class="insert-panel-body">
        <div class="add-element-grid">
          <button class="add-element-btn" data-element-type="text" title="插入文本段落">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7V4h16v3" />
              <path d="M9 20h6" />
              <path d="M12 4v16" />
            </svg>
            <span>文本块</span>
          </button>
          <button class="add-element-btn" data-element-type="heading" title="插入标题">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 4v16" />
              <path d="M18 4v16" />
              <path d="M6 12h12" />
            </svg>
            <span>标题</span>
          </button>
          <button class="add-element-btn" data-element-type="button" title="插入按钮">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="8" width="18" height="8" rx="3" />
              <line x1="8" y1="12" x2="16" y2="12" />
            </svg>
            <span>按钮</span>
          </button>
          <button class="add-element-btn" data-element-type="divider" title="插入分割线">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12" />
            </svg>
            <span>分割线</span>
          </button>
          <button class="add-element-btn" data-element-type="box" title="插入矩形色块">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" />
            </svg>
            <span>色块</span>
          </button>
          <button class="add-element-btn" data-element-type="image" title="插入图片占位框">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
            <span>图片框</span>
          </button>
          <button class="add-element-btn" data-element-type="circle" title="插入圆形">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="9" />
            </svg>
            <span>圆形</span>
          </button>
          <button class="add-element-btn" data-element-type="square" title="插入正方形">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="4" width="16" height="16" />
            </svg>
            <span>正方形</span>
          </button>
          <button class="add-element-btn" data-element-type="link" title="插入链接">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
            <span>链接</span>
          </button>
          <button class="add-element-btn" data-element-type="list" title="插入无序列表">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <circle cx="4" cy="6" r="1" fill="currentColor" />
              <circle cx="4" cy="12" r="1" fill="currentColor" />
              <circle cx="4" cy="18" r="1" fill="currentColor" />
            </svg>
            <span>列表</span>
          </button>
          <button class="add-element-btn add-element-layout" data-element-type="flex-row" title="插入横向布局容器">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <line x1="12" y1="3" x2="12" y2="21" />
            </svg>
            <span>横向布局</span>
          </button>
          <button class="add-element-btn add-element-layout" data-element-type="flex-col" title="插入纵向布局容器">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <line x1="3" y1="12" x2="21" y2="12" />
            </svg>
            <span>纵向布局</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>

</html>
